# Flow: Rapid tab switching — stress test that navigation doesn't crash the app
# Prerequisites: Permissions granted by run-tests.sh Phase 2
appId: ai.talkingrock.lithium.debug
---
- stopApp
- waitForAnimationToEnd
- launchApp

# Wait for main screen using the invariant "Briefing" tab label
- extendedWaitUntil:
    visible:
      text: "Briefing"
    timeout: 30000

# Rapid tab switching — 3 rounds
- repeat:
    times: 3
    commands:
      - tapOn: "Queue"
      - waitForAnimationToEnd
      - tapOn: "Rules"
      - waitForAnimationToEnd
      - tapOn: "Settings"
      - waitForAnimationToEnd
      - tapOn: "Chat"
      - waitForAnimationToEnd

# App should still be alive — Briefing tab is always visible
- assertVisible: "Briefing"

# Open add rule and back — verify navigation stack integrity
- tapOn: "Rules"
- waitForAnimationToEnd
# Compose FAB uses contentDescription "Add rule" — tap by accessibility label.
- tapOn: "Add rule"
- extendedWaitUntil:
    visible:
      text: "New Rule"
    timeout: 5000
- pressKey: back

# Back on Rules
- extendedWaitUntil:
    visible:
      text: "Rules"
    timeout: 3000

# Final check — Settings About section still reachable
- tapOn: "Settings"
- scrollUntilVisible:
    element:
      text: "About"
    direction: DOWN
    centerElement: true
- assertVisible: "by Talking Rock"

# Return to Briefing — app should still be responsive
- tapOn: "Chat"
- extendedWaitUntil:
    visible:
      text: "Briefing"
    timeout: 5000
