# Flow: Rapid tab switching — stress test navigation doesn't crash
# Prerequisites: Permissions granted by wrapper script before Maestro runs
appId: ai.talkingrock.lithium.debug
---
- stopApp
- waitForAnimationToEnd
- launchApp

# Wait for app ready
- extendedWaitUntil:
    visible:
      text: "No new report."
    timeout: 15000

# Rapid tab switching cycle — 3 rounds
- repeat:
    times: 3
    commands:
      - tapOn: "Queue"
      - waitForAnimationToEnd
      - tapOn: "Rules"
      - waitForAnimationToEnd
      - tapOn: "Settings"
      - waitForAnimationToEnd
      - tapOn: "Briefing"
      - waitForAnimationToEnd

# App should still be alive
- assertVisible: "No new report."

# Open add rule and back — verify navigation stack
- tapOn: "Rules"
- waitForAnimationToEnd
- tapOn:
    id: "Add rule"
- extendedWaitUntil:
    visible:
      text: "New Rule"
    timeout: 3000
- pressKey: back

# Back on Rules
- extendedWaitUntil:
    visible:
      text: "Rules"
    timeout: 3000

# Final check — Settings about section
- tapOn: "Settings"
- scrollUntilVisible:
    element:
      text: "About"
    direction: DOWN
- assertVisible: "Lithium v0.1.0"

- tapOn: "Briefing"
- assertVisible: "No new report."
