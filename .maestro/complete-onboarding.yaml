# Helper flow: Walk the 7-page onboarding pager to set ONBOARDING_COMPLETE=true,
# so subsequent flows launch directly into the Briefing screen.
#
# Prerequisites: Permissions already granted by run-tests.sh Phase 2 (notification
# listener, usage stats, contacts). This flow taps "Next" / "Get Started" on each
# page without re-requesting permissions.
#
# Pager layout (from SetupScreen.kt):
#   1. Welcome          → Next
#   2. Privacy          → Next
#   3. Notification Access → Next (enabled once listener is allowed)
#   4. Battery Optimization → "Next" if exempt, else "Skip"
#   5. Usage Access     → "Next" if granted, else "Skip"
#   6. Contacts         → "Next" if granted, else "Skip"
#   7. Learning Period  → Get Started
appId: ai.talkingrock.lithium.debug
---
- stopApp
- waitForAnimationToEnd
- launchApp

# If the app already routes to Briefing (onboarding previously completed),
# short-circuit and skip the pager walk.
- runFlow:
    when:
      visible: "Briefing"
    commands:
      - assertVisible: "Briefing"

# Otherwise, we're on the Welcome page — walk the pager.
- runFlow:
    when:
      notVisible: "Your Briefing"
    commands:
      # Page 1: Welcome
      - extendedWaitUntil:
          visible:
            text: "Next"
          timeout: 15000
      - tapOn: "Next"
      # Page 2: Privacy
      - extendedWaitUntil:
          visible:
            text: "Next"
          timeout: 5000
      - tapOn: "Next"
      # Page 3: Notification Access — "Next" is enabled because listener is allowed
      - extendedWaitUntil:
          visible:
            text: "Next"
          timeout: 5000
      - tapOn: "Next"
      # Page 4: Battery Optimization — accept either "Next" or "Skip"
      - runFlow:
          when:
            visible: "Next"
          commands:
            - tapOn: "Next"
      - runFlow:
          when:
            visible: "Skip"
          commands:
            - tapOn: "Skip"
      # Page 5: Usage Access
      - runFlow:
          when:
            visible: "Next"
          commands:
            - tapOn: "Next"
      - runFlow:
          when:
            visible: "Skip"
          commands:
            - tapOn: "Skip"
      # Page 6: Contacts
      - runFlow:
          when:
            visible: "Next"
          commands:
            - tapOn: "Next"
      - runFlow:
          when:
            visible: "Skip"
          commands:
            - tapOn: "Skip"
      # Page 7: Learning Period — "Get Started" commits ONBOARDING_COMPLETE=true
      - extendedWaitUntil:
          visible:
            text: "Get Started"
          timeout: 5000
      - tapOn: "Get Started"

# After completion, the app should route to Briefing.
- extendedWaitUntil:
    visible:
      text: "Briefing"
    timeout: 15000
- assertVisible: "Briefing"
