# Helper flow: Walk the 9-page onboarding pager (indexes 0-8) to set
# ONBOARDING_COMPLETE=true so subsequent flows launch directly into Briefing.
#
# Prerequisites: Permissions already granted by run-tests.sh Phase 2.
#
# Pager layout (from SetupScreen.kt:184-254):
#   0. Title            → Next
#   1. Welcome          → Next
#   2. Privacy          → Next
#   3. Notification Access → Next (enabled once listener is allowed)
#   4. Battery Optimization → "Next" if exempt, else "Skip"
#   5. Shade Ownership  → Next
#   6. Usage Access     → "Next" if granted, else "Skip"
#   7. Contacts         → "Next" if granted, else "Skip"
#   8. Learning Period  → Get Started
# → 8 page-advance taps + 1 Get Started tap.
appId: ai.talkingrock.lithium.debug
---
- stopApp
- waitForAnimationToEnd
- launchApp

# If the app already routes to Briefing (onboarding previously completed),
# short-circuit and skip the pager walk.
- runFlow:
    when:
      visible: "Briefing"
    commands:
      - assertVisible: "Briefing"

# Otherwise, we're on the Welcome page — walk the pager.
# Pages 1-6 each expose exactly one navigation button ("Next" or "Skip");
# page 7 exposes "Get Started". We use a regex tap that matches either label,
# which guarantees exactly one advance per page regardless of permission state.
- runFlow:
    when:
      notVisible: "Briefing"
    commands:
      # Page 0: Title
      - extendedWaitUntil:
          visible:
            text: "Next"
          timeout: 30000
      - tapOn:
          text: "^(Next|Skip)$"
      - waitForAnimationToEnd
      # Page 1: Welcome
      - extendedWaitUntil:
          visible:
            text: "^(Next|Skip)$"
          timeout: 5000
      - tapOn:
          text: "^(Next|Skip)$"
      - waitForAnimationToEnd
      # Page 2: Privacy
      - extendedWaitUntil:
          visible:
            text: "^(Next|Skip)$"
          timeout: 5000
      - tapOn:
          text: "^(Next|Skip)$"
      - waitForAnimationToEnd
      # Page 3: Notification Access
      - extendedWaitUntil:
          visible:
            text: "^(Next|Skip)$"
          timeout: 5000
      - tapOn:
          text: "^(Next|Skip)$"
      - waitForAnimationToEnd
      # Page 4: Battery Optimization
      - extendedWaitUntil:
          visible:
            text: "^(Next|Skip)$"
          timeout: 5000
      - tapOn:
          text: "^(Next|Skip)$"
      - waitForAnimationToEnd
      # Page 5: Shade Ownership
      - extendedWaitUntil:
          visible:
            text: "^(Next|Skip)$"
          timeout: 5000
      - tapOn:
          text: "^(Next|Skip)$"
      - waitForAnimationToEnd
      # Page 6: Usage Access
      - extendedWaitUntil:
          visible:
            text: "^(Next|Skip)$"
          timeout: 5000
      - tapOn:
          text: "^(Next|Skip)$"
      - waitForAnimationToEnd
      # Page 7: Contacts
      - extendedWaitUntil:
          visible:
            text: "^(Next|Skip)$"
          timeout: 5000
      - tapOn:
          text: "^(Next|Skip)$"
      - waitForAnimationToEnd
      # Page 8: Learning Period — "Get Started" commits ONBOARDING_COMPLETE=true
      - extendedWaitUntil:
          visible:
            text: "Get Started"
          timeout: 5000
      - tapOn: "Get Started"

# After completion, the app should route to Briefing.
- extendedWaitUntil:
    visible:
      text: "Briefing"
    timeout: 30000
- assertVisible: "Briefing"
