# Helper flow: Walk the 10-page onboarding pager (indexes 0-9) to set
# ONBOARDING_COMPLETE=true so subsequent flows launch directly into Briefing.
#
# Prerequisites: Permissions already granted by run-tests.sh Phase 2.
#
# Pager layout (from SetupScreen.kt):
#   0. Title              → Next
#   1. Welcome            → Next
#   2. How It Works       → Next
#   3. Privacy            → Next
#   4. Notification Access → Next (enabled once listener is allowed)
#   5. Battery Optimization → "Next" if exempt, else "Skip"
#   6. Shade Ownership    → Next
#   7. Usage Access       → "Next" if granted, else "Skip"
#   8. Contacts           → "Next" if granted, else "Skip"
#   9. Learning Period    → Get Started
# → 9 page-advance taps + 1 Get Started tap.
appId: ai.talkingrock.lithium.debug
---
- stopApp
- waitForAnimationToEnd
- launchApp

# If the app already routes to Briefing (onboarding previously completed),
# short-circuit and skip the pager walk.
- runFlow:
    when:
      visible: "Chat"
    commands:
      - assertVisible: "Chat"

# Otherwise, we're on the Welcome page — walk the pager.
# Pages 1-6 each expose exactly one navigation button ("Next" or "Skip");
# page 7 exposes "Get Started". We use a regex tap that matches either label,
# which guarantees exactly one advance per page regardless of permission state.
- runFlow:
    when:
      notVisible: "Chat"
    commands:
      # Page 0: Title
      - extendedWaitUntil:
          visible:
            text: "Next"
          timeout: 30000
      - tapOn:
          text: "^(Next|Skip)$"
      - waitForAnimationToEnd
      # Page 1: Welcome
      - extendedWaitUntil:
          visible:
            text: "^(Next|Skip)$"
          timeout: 5000
      - tapOn:
          text: "^(Next|Skip)$"
      - waitForAnimationToEnd
      # Page 2: How It Works
      - extendedWaitUntil:
          visible:
            text: "^(Next|Skip)$"
          timeout: 5000
      - tapOn:
          text: "^(Next|Skip)$"
      - waitForAnimationToEnd
      # Page 3: Privacy
      - extendedWaitUntil:
          visible:
            text: "^(Next|Skip)$"
          timeout: 5000
      - tapOn:
          text: "^(Next|Skip)$"
      - waitForAnimationToEnd
      # Page 4: Notification Access
      - extendedWaitUntil:
          visible:
            text: "^(Next|Skip)$"
          timeout: 5000
      - tapOn:
          text: "^(Next|Skip)$"
      - waitForAnimationToEnd
      # Page 5: Battery Optimization
      - extendedWaitUntil:
          visible:
            text: "^(Next|Skip)$"
          timeout: 5000
      - tapOn:
          text: "^(Next|Skip)$"
      - waitForAnimationToEnd
      # Page 6: Shade Ownership
      - extendedWaitUntil:
          visible:
            text: "^(Next|Skip)$"
          timeout: 5000
      - tapOn:
          text: "^(Next|Skip)$"
      - waitForAnimationToEnd
      # Page 7: Usage Access
      - extendedWaitUntil:
          visible:
            text: "^(Next|Skip)$"
          timeout: 5000
      - tapOn:
          text: "^(Next|Skip)$"
      - waitForAnimationToEnd
      # Page 8: Contacts
      - extendedWaitUntil:
          visible:
            text: "^(Next|Skip)$"
          timeout: 5000
      - tapOn:
          text: "^(Next|Skip)$"
      - waitForAnimationToEnd
      # Page 9: Learning Period — "Get Started" commits ONBOARDING_COMPLETE=true
      - extendedWaitUntil:
          visible:
            text: "Get Started"
          timeout: 5000
      - tapOn: "Get Started"

# After completion, the app should route to Briefing.
- extendedWaitUntil:
    visible:
      text: "Chat"
    timeout: 30000
- assertVisible: "Chat"
