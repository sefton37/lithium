# Flow: Verify add-rule screen loads and app dropdown is populated
# Prerequisites: Permissions granted and test notification sent by wrapper script before Maestro runs
# The wrapper sends a notification via ADB; this flow verifies the app can present captured packages
appId: ai.talkingrock.lithium.debug
---
- launchApp

# Wait for app to be ready
- extendedWaitUntil:
    visible:
      text: "No new report."
    timeout: 15000

# Navigate to Rules to check if the package appears in the add-rule dropdown
- tapOn: "Rules"
- extendedWaitUntil:
    visible:
      text: "No rules yet."
    timeout: 5000

- tapOn:
    id: "Add rule"

- extendedWaitUntil:
    visible:
      text: "New Rule"
    timeout: 5000

# Verify the form is fully rendered
- assertVisible: "App"
- assertVisible: "Action"
- assertVisible: "Save Rule"

# Tap the app dropdown — the test notification's package should now appear
- tapOn: "Select an app"
- waitForAnimationToEnd

# Dismiss and go back
- pressKey: back
- pressKey: back
