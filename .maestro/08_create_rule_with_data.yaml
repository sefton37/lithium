# Flow: Create a rule after notifications have been captured
# Prerequisites: Permissions granted by wrapper script; run 07 first or have real notification data
appId: ai.talkingrock.lithium.debug
---
- launchApp

# Wait for app ready
- extendedWaitUntil:
    visible:
      text: "Briefing"
    timeout: 15000

# Navigate to Rules
- tapOn: "Rules"
- waitForAnimationToEnd

# Tap FAB to add rule
- tapOn:
    id: "Add rule"

- extendedWaitUntil:
    visible:
      text: "New Rule"
    timeout: 5000

# If packages are available, select the first one
- tapOn: "Select an app"
- waitForAnimationToEnd

# Try tapping on the first available package (skip if none available)
- tapOn:
    index: 0
    optional: true

# Select action: Queue for later
- tapOn: "Suppress"
- waitForAnimationToEnd
- tapOn: "Queue for later"

# Add a channel filter
- tapOn: "Channel filter (optional)"
- inputText: "test_channel"

# Verify description auto-generated
- assertVisible: "Description"

# Save the rule
- tapOn: "Save Rule"
- waitForAnimationToEnd

# Should be back on Rules screen with the new rule
# (only if save succeeded — depends on whether a package was selected)
