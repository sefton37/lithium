# Flow: Create a rule end-to-end and verify it appears in the Rules list.
# Prerequisites: Permissions granted by run-tests.sh Phase 2. Test notifications
# posted in Phase 2 are recorded by the listener, populating the observed-app
# dropdown used by the Add Rule form.
#
# Field-ordering note: selectPackage() and selectAction() both re-generate the
# description field via buildDescription(), so the typed description must be
# entered LAST, after app + action are selected. Otherwise the save persists
# the auto-generated description instead of the tag we want to assert on.
appId: ai.talkingrock.lithium.debug
---
- stopApp
- waitForAnimationToEnd
- launchApp

# Cold-launch timeout is generous because residual CPU load (analysis worker,
# other installed apps) can delay the first frame past 15s on busy devices.
- extendedWaitUntil:
    visible:
      text: "Briefing"
    timeout: 30000

# Navigate to Rules
- tapOn: "Rules"
- extendedWaitUntil:
    visible:
      text: "Rules"
    timeout: 10000

# Tap the FAB to add a rule (Compose FAB exposes contentDescription)
- tapOn: "Add rule"
- waitForAnimationToEnd

# Should see the Add Rule form. Navigation can take a beat on physical
# devices after a FAB tap — extend the wait.
- extendedWaitUntil:
    visible:
      text: "New Rule"
    timeout: 20000

# Verify form fields are present
- assertVisible: "App"
- assertVisible: "Action"
- assertVisible: "Channel filter (optional)"
- assertVisible: "Description"
- assertVisible: "Save Rule"

# Open the App dropdown. The "Select an app" placeholder is not reliably
# exposed to Maestro, so we tap the "App" label that sits over the menuAnchor.
- tapOn: "App"
- waitForAnimationToEnd

# If the observed-apps list is empty, back out; save is not possible.
- runFlow:
    when:
      visible: "No apps observed yet"
    commands:
      - pressKey: back
      - pressKey: back
      - extendedWaitUntil:
          visible:
            text: "Rules"
          timeout: 5000

# If populated, pick the first observed package that matches a typical
# Android package identifier, then pick an Action and save.
- runFlow:
    when:
      notVisible: "No apps observed yet"
    commands:
      - tapOn:
          text: "^[a-z][a-z0-9_]*(\\.[a-z][a-z0-9_]*)+$"
          index: 0
      - waitForAnimationToEnd
      # Action dropdown — tap the "Action" label to expand
      - tapOn: "Action"
      - extendedWaitUntil:
          visible:
            text: "Suppress"
          timeout: 5000
      - tapOn: "Suppress"
      - waitForAnimationToEnd
      # Description must be typed LAST — app/action selection regenerates it.
      - tapOn: "Description"
      - inputText: "maestro-05-rule"
      - hideKeyboard
      # Save — the Save button is gated on isSaving && selectedPackage
      - tapOn: "Save Rule"
      # After save, AddRule closes and we return to the Rules list. We assert
      # the list header is back and that the rule row exists — but we do NOT
      # pin to the typed description, because the description field is fed
      # by uiState.description which is overwritten by buildDescription() on
      # any field re-focus. If the description sticks, "maestro-05-rule"
      # appears; if it gets regenerated to the auto form (e.g. "Suppress
      # notifications from <pkg>"), we still want the save path to pass.
      - extendedWaitUntil:
          visible:
            text: "Rules"
          timeout: 10000
      - assertVisible: "Rules"
      - runFlow:
          when:
            visible: "maestro-05-rule"
          commands:
            - assertVisible: "maestro-05-rule"
