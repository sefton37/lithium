# Flow: Open Add Rule form and verify it renders
# Prerequisites: Permissions granted by run-tests.sh Phase 2
appId: ai.talkingrock.lithium.debug
---
- stopApp
- waitForAnimationToEnd
- launchApp

# Wait for app to load — use "Briefing" tab label (always present)
- extendedWaitUntil:
    visible:
      text: "Briefing"
    timeout: 15000

# Navigate to Rules
- tapOn: "Rules"
- extendedWaitUntil:
    visible:
      text: "Rules"
    timeout: 5000

# Tap the FAB to add a rule
# Compose FABs expose contentDescription as the accessibility label, not resource-id.
# Maestro resolves accessibility labels via text match.
- tapOn: "Add rule"

# Should see the Add Rule form
- extendedWaitUntil:
    visible:
      text: "New Rule"
    timeout: 5000

# Verify form fields are present
- assertVisible: "App"
- assertVisible: "Action"
- assertVisible: "Channel filter (optional)"
- assertVisible: "Description"
- assertVisible: "Save Rule"

# Go back to Rules
- pressKey: back
- extendedWaitUntil:
    visible:
      text: "Rules"
    timeout: 5000
