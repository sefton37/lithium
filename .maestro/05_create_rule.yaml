# Flow: Create a rule end-to-end and verify it appears in the Rules list.
# Prerequisites: Permissions granted by run-tests.sh Phase 2. Test notifications
# posted in Phase 2 should be recorded by the listener, populating the observed-app
# dropdown used by the Add Rule form.
#
# The app-observation list is data-dependent: if no apps are observed yet, the
# dropdown shows "No apps observed yet…" and saving is disabled. This flow handles
# both paths via runFlow branches.
appId: ai.talkingrock.lithium.debug
---
- stopApp
- waitForAnimationToEnd
- launchApp

# Wait for app to load — use "Briefing" tab label (always present)
- extendedWaitUntil:
    visible:
      text: "Briefing"
    timeout: 15000

# Navigate to Rules
- tapOn: "Rules"
- extendedWaitUntil:
    visible:
      text: "Rules"
    timeout: 5000

# Tap the FAB to add a rule (Compose FAB exposes contentDescription)
- tapOn: "Add rule"

# Should see the Add Rule form
- extendedWaitUntil:
    visible:
      text: "New Rule"
    timeout: 5000

# Verify form fields are present
- assertVisible: "App"
- assertVisible: "Action"
- assertVisible: "Channel filter (optional)"
- assertVisible: "Description"
- assertVisible: "Save Rule"

# Enter a description that we can search for in the Rules list afterward
- tapOn: "Description"
- inputText: "maestro-05-rule"
- hideKeyboard

# Open the App dropdown. The field is an ExposedDropdownMenuBox with a read-only
# text field; its "Select an app" placeholder is not reliably exposed to Maestro,
# so we tap the floating "App" label (which sits over the menuAnchor'd field).
- tapOn: "App"
- waitForAnimationToEnd

# If observed-apps list is empty, abort the save path and back out to Rules.
- runFlow:
    when:
      visible: "No apps observed yet"
    commands:
      - pressKey: back
      - pressKey: back
      - extendedWaitUntil:
          visible:
            text: "Rules"
          timeout: 5000

# If the dropdown populated, pick the first observed package that matches a
# typical Android package identifier (at least one dot, lowercase).
- runFlow:
    when:
      notVisible: "No apps observed yet"
    commands:
      - tapOn:
          text: "^[a-z][a-z0-9_]*(\\.[a-z][a-z0-9_]*)+$"
          index: 0
      - waitForAnimationToEnd
      # Pick an Action — tap the "Action" label to expand its dropdown
      - tapOn: "Action"
      - extendedWaitUntil:
          visible:
            text: "Suppress"
          timeout: 3000
      - tapOn: "Suppress"
      # Save the rule
      - tapOn: "Save Rule"
      # After save we should be back on the Rules list; verify the rule row exists.
      - extendedWaitUntil:
          visible:
            text: "maestro-05-rule"
          timeout: 5000
      - assertVisible: "maestro-05-rule"
