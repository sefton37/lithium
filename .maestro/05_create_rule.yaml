# Flow: Create a rule end-to-end and verify it appears in the Rules list.
# Prerequisites: Permissions granted by run-tests.sh Phase 2. Test notifications
# posted in Phase 2 should be recorded by the listener, populating the observed-app
# dropdown used by the Add Rule form.
#
# The app-observation list is data-dependent: if no apps are observed yet, the
# dropdown shows "No apps observed yet…" and saving is disabled. This flow handles
# both paths via runFlow branches.
appId: ai.talkingrock.lithium.debug
---
- stopApp
- waitForAnimationToEnd
- launchApp

# Wait for app to load — use "Briefing" tab label (always present)
- extendedWaitUntil:
    visible:
      text: "Briefing"
    timeout: 15000

# Navigate to Rules
- tapOn: "Rules"
- extendedWaitUntil:
    visible:
      text: "Rules"
    timeout: 5000

# Tap the FAB to add a rule (Compose FAB exposes contentDescription)
- tapOn: "Add rule"

# Should see the Add Rule form
- extendedWaitUntil:
    visible:
      text: "New Rule"
    timeout: 5000

# Verify form fields are present
- assertVisible: "App"
- assertVisible: "Action"
- assertVisible: "Channel filter (optional)"
- assertVisible: "Description"
- assertVisible: "Save Rule"

# Enter a description that we can search for in the Rules list afterward
- tapOn: "Description"
- inputText: "maestro-05-rule"
- hideKeyboard

# Open the App dropdown
- tapOn: "Select an app"

# If observed-apps list is empty, abort the save path and just back out.
- runFlow:
    when:
      visible: "No apps observed yet. Notifications will appear here after Lithium runs."
    commands:
      - pressKey: back
      - pressKey: back
      - extendedWaitUntil:
          visible:
            text: "Rules"
          timeout: 5000

# If the dropdown populated, pick an observed package. Notifications posted via
# `adb shell cmd notification post` register under the shell package, so that's
# what will appear in the observed-apps list during the test run.
- runFlow:
    when:
      visible: "com.android.shell"
    commands:
      - tapOn: "com.android.shell"
      # Pick an Action — open the Action dropdown and choose "Suppress"
      - tapOn:
          text: "Action"
          index: 1
      - extendedWaitUntil:
          visible:
            text: "Suppress"
          timeout: 3000
      - tapOn: "Suppress"
      # Save the rule
      - tapOn: "Save Rule"
      # After save we should be back on the Rules list; verify the rule row exists.
      - extendedWaitUntil:
          visible:
            text: "maestro-05-rule"
          timeout: 5000
      - assertVisible: "maestro-05-rule"

# If neither branch matched (defensive fallback): ensure we return to Rules
- runFlow:
    when:
      notVisible: "Rules"
    commands:
      - pressKey: back
      - extendedWaitUntil:
          visible:
            text: "Rules"
          timeout: 5000
