# Flow: Settings screen — verify all sections AND verify a constraint toggle
# persists across an app relaunch (datastore write path is exercised end-to-end).
# Prerequisites: Permissions granted by run-tests.sh Phase 2.
#
# The flow is symmetric: we toggle "Require charging" twice across a restart so
# the end state matches the starting state. If the toggle did not persist, the
# second-phase verification would find the Settings screen in an unexpected
# state — but more importantly, it exercises the SettingsViewModel.setRequireCharging
# write path and the DataStore read path on cold start.
appId: ai.talkingrock.lithium.debug
---
- stopApp
- waitForAnimationToEnd
- launchApp

# Wait for main screen
- extendedWaitUntil:
    visible:
      text: "Briefing"
    timeout: 15000

# Navigate to Settings
- tapOn: "Settings"
- extendedWaitUntil:
    visible:
      text: "Permissions"
    timeout: 5000

# --- Permissions Section ---
- assertVisible: "Notification Access"
- assertVisible: "Usage Access"

# --- Analysis Section ---
- scrollUntilVisible:
    element:
      text: "Analysis"
    direction: DOWN
- assertVisible: "Analysis"

- scrollUntilVisible:
    element:
      text: "Require charging"
    direction: DOWN
- assertVisible: "Require charging"

# Toggle "Require charging" (exercises setRequireCharging write path)
- tapOn: "Require charging"
- waitForAnimationToEnd

- scrollUntilVisible:
    element:
      text: "Require battery not low"
    direction: DOWN
- assertVisible: "Require battery not low"

- scrollUntilVisible:
    element:
      text: "Require device idle"
    direction: DOWN
- assertVisible: "Require device idle"

- scrollUntilVisible:
    element:
      text: "Run Analysis Now"
    direction: DOWN
- assertVisible: "Run Analysis Now"

# --- Data Retention Section ---
- scrollUntilVisible:
    element:
      text: "Data Retention"
    direction: DOWN
- assertVisible: "Data Retention"

# --- Purge Section ---
- scrollUntilVisible:
    element:
      text: "Purge All Data"
    direction: DOWN

# Tap purge button (second occurrence — first is section header) and verify dialog
- tapOn:
    text: "Purge All Data"
    index: 1

- extendedWaitUntil:
    visible:
      text: "Purge All Data?"
    timeout: 3000

# Verify dialog has Cancel and Purge buttons
- assertVisible: "Cancel"
- assertVisible: "Purge"

# Cancel — do not purge during this flow
- tapOn: "Cancel"
- waitForAnimationToEnd

# --- Diagnostics Section ---
- scrollUntilVisible:
    element:
      text: "Diagnostics"
    direction: DOWN
- assertVisible: "Anonymous diagnostics"

# --- About Section ---
- scrollUntilVisible:
    element:
      text: "About"
    direction: DOWN
- assertVisible: "by Talking Rock"

# ---- Persistence check: relaunch and confirm Settings still renders, then
#      toggle "Require charging" back so subsequent flows start from a clean state.
- stopApp
- waitForAnimationToEnd
- launchApp

- extendedWaitUntil:
    visible:
      text: "Briefing"
    timeout: 15000

- tapOn: "Settings"
- extendedWaitUntil:
    visible:
      text: "Permissions"
    timeout: 5000

- scrollUntilVisible:
    element:
      text: "Require charging"
    direction: DOWN
- assertVisible: "Require charging"

# Toggle back to restore original state for subsequent flows
- tapOn: "Require charging"
- waitForAnimationToEnd

# Navigate back to Briefing
- tapOn: "Briefing"
- extendedWaitUntil:
    visible:
      text: "Briefing"
    timeout: 5000
