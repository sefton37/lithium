# Flow: Settings screen — test data retention, purge dialog, diagnostics toggle
# Prerequisites: Permissions granted by wrapper script before Maestro runs
appId: ai.talkingrock.lithium.debug
---
- stopApp
- waitForAnimationToEnd
- launchApp

# Wait for briefing
- extendedWaitUntil:
    visible:
      text: "No new report."
    timeout: 15000

# Navigate to Settings
- tapOn: "Settings"
- extendedWaitUntil:
    visible:
      text: "Permissions"
    timeout: 5000

# --- Permissions Section ---
- assertVisible: "Notification Access"
- assertVisible: "Usage Access"

# --- Data Retention Section ---
- scrollUntilVisible:
    element:
      text: "Data Retention"
    direction: DOWN
- assertVisible: "Data Retention"

# --- Purge Section ---
- scrollUntilVisible:
    element:
      text: "Purge All Data"
    direction: DOWN

# Tap purge button and verify confirmation dialog
- tapOn:
    text: "Purge All Data"
    index: 1

- extendedWaitUntil:
    visible:
      text: "Purge All Data?"
    timeout: 3000
- assertVisible: "This cannot be undone."

# Cancel the purge
- tapOn: "Cancel"
- waitForAnimationToEnd

# --- Diagnostics Section ---
- scrollUntilVisible:
    element:
      text: "Diagnostics"
    direction: DOWN
- assertVisible: "Anonymous diagnostics"

# --- About Section ---
- scrollUntilVisible:
    element:
      text: "About"
    direction: DOWN
- assertVisible: "Lithium v0.1.0"
- assertVisible: "by Talking Rock"
