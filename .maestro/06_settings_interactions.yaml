# Flow: Settings screen — verify all sections including new Analysis section
# Prerequisites: Permissions granted by run-tests.sh Phase 2
appId: ai.talkingrock.lithium.debug
---
- stopApp
- waitForAnimationToEnd
- launchApp

# Wait for main screen
- extendedWaitUntil:
    visible:
      text: "Briefing"
    timeout: 15000

# Navigate to Settings
- tapOn: "Settings"
- extendedWaitUntil:
    visible:
      text: "Permissions"
    timeout: 5000

# --- Permissions Section ---
- assertVisible: "Notification Access"
- assertVisible: "Usage Access"

# --- Analysis Section ---
- scrollUntilVisible:
    element:
      text: "Analysis"
    direction: DOWN
- assertVisible: "Analysis"

- scrollUntilVisible:
    element:
      text: "Require charging"
    direction: DOWN
- assertVisible: "Require charging"

- scrollUntilVisible:
    element:
      text: "Require battery not low"
    direction: DOWN
- assertVisible: "Require battery not low"

- scrollUntilVisible:
    element:
      text: "Require device idle"
    direction: DOWN
- assertVisible: "Require device idle"

- scrollUntilVisible:
    element:
      text: "Run Analysis Now"
    direction: DOWN
- assertVisible: "Run Analysis Now"

# --- Data Retention Section ---
- scrollUntilVisible:
    element:
      text: "Data Retention"
    direction: DOWN
- assertVisible: "Data Retention"

# --- Purge Section ---
- scrollUntilVisible:
    element:
      text: "Purge All Data"
    direction: DOWN

# Tap purge button (second occurrence — first is section header) and verify dialog
- tapOn:
    text: "Purge All Data"
    index: 1

- extendedWaitUntil:
    visible:
      text: "Purge All Data?"
    timeout: 3000

# Verify dialog has Cancel and Purge buttons
- assertVisible: "Cancel"
- assertVisible: "Purge"

# Cancel — do not purge during this flow
- tapOn: "Cancel"
- waitForAnimationToEnd

# --- Diagnostics Section ---
- scrollUntilVisible:
    element:
      text: "Diagnostics"
    direction: DOWN
- assertVisible: "Anonymous diagnostics"

# --- About Section ---
- scrollUntilVisible:
    element:
      text: "About"
    direction: DOWN
- assertVisible: "by Talking Rock"
