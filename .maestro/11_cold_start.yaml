# Flow: Cold start — force stop then launch twice, verify app recovers each time
# Prerequisites: Permissions granted by run-tests.sh Phase 2
appId: ai.talkingrock.lithium.debug
---
# First cold start
- stopApp
- waitForAnimationToEnd
- launchApp

# Should reach a usable screen without crashing
- extendedWaitUntil:
    visible:
      text: "Briefing"
    timeout: 30000

# Second cold start
- stopApp
- waitForAnimationToEnd
- launchApp

# Should still work
- extendedWaitUntil:
    visible:
      text: "Briefing"
    timeout: 30000

# Verify all tabs still work after double cold restart
- tapOn: "Queue"
- waitForAnimationToEnd
- tapOn: "Rules"
- waitForAnimationToEnd
- tapOn: "Settings"
- waitForAnimationToEnd
- tapOn: "Chat"
- waitForAnimationToEnd

# App is alive and on the Briefing tab
- assertVisible: "Briefing"
