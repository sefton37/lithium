# Flow: Purge all data and verify the app resets cleanly
# Prerequisites: Permissions granted by run-tests.sh Phase 2; some data exists
# NOTE: This flow is destructive — it purges all notification data.
# Run it last in the data-dependent suite, or re-seed data afterwards.
appId: ai.talkingrock.lithium.debug
---
# Force a cold start so Settings opens scrolled to the top and isPurging=false —
# prior flows may leave the app mid-scroll or with a stale Settings state.
- stopApp
- waitForAnimationToEnd
- launchApp

# Wait for main screen using the invariant "Briefing" tab label
- extendedWaitUntil:
    visible:
      text: "Briefing"
    timeout: 30000

# Navigate to Settings
- tapOn: "Settings"
- extendedWaitUntil:
    visible:
      text: "Settings"
    timeout: 5000

# Scroll to purge section
- scrollUntilVisible:
    element:
      text: "Purge All Data"
    direction: DOWN
    centerElement: true

# Tap the purge button (index 1 — first occurrence is the section header, second is the button)
- tapOn:
    text: "Purge All Data"
    index: 1

# Confirm in dialog
- extendedWaitUntil:
    visible:
      text: "Purge All Data?"
    timeout: 3000
- tapOn: "Purge"

# Wait for purge to complete
- waitForAnimationToEnd

# Queue should be empty after purge
- tapOn: "Queue"
- extendedWaitUntil:
    visible:
      text: "No queued notifications."
    timeout: 5000

# Rules are preserved by purge — just check the tab renders
- tapOn: "Rules"
- extendedWaitUntil:
    visible:
      text: "Rules"
    timeout: 5000

# Briefing should show empty state after purge
- tapOn: "Chat"
- extendedWaitUntil:
    visible:
      text: "Briefing"
    timeout: 5000
# After purge, the briefing may show "No new report." (report cleared) or
# "Lithium is learning" (data-readiness state also reset). Both are valid.
# The invariant — the "Briefing" tab label being visible — is sufficient.
# We already confirmed it above, so no further assertion is needed here.
