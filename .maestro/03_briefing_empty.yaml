# Flow: Briefing Screen — Empty state (no reports yet)
# Prerequisites: Permissions granted by wrapper script before Maestro runs
appId: ai.talkingrock.lithium.debug
---
- stopApp
- waitForAnimationToEnd
- launchApp

# Wait for briefing screen
- extendedWaitUntil:
    visible:
      text: "No new report."
    timeout: 15000

# Verify empty state content
- assertVisible: "No new report."
- assertVisible: "Your next briefing will appear after the nightly analysis runs"

# Verify bottom nav is present
- assertVisible: "Briefing"
- assertVisible: "Queue"
- assertVisible: "Rules"
- assertVisible: "Settings"
