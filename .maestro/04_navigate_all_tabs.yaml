# Flow: Navigate all bottom tabs — verify each screen renders without crashing
# Prerequisites: Permissions granted by run-tests.sh Phase 2
# All tab assertions use invariant text that is always present regardless of data state.
appId: ai.talkingrock.lithium.debug
---
- stopApp
- waitForAnimationToEnd
- launchApp

# Wait for main screen
- extendedWaitUntil:
    visible:
      text: "Briefing"
    timeout: 15000

# --- Queue tab ---
- tapOn: "Queue"
- extendedWaitUntil:
    visible:
      text: "Queue"
    timeout: 5000
# Queue is empty or has items — both are valid. We just check the tab loaded.

# --- Rules tab ---
- tapOn: "Rules"
- extendedWaitUntil:
    visible:
      text: "Rules"
    timeout: 5000
# Rules may be empty or populated — both are valid.

# --- Settings tab ---
- tapOn: "Settings"
- extendedWaitUntil:
    visible:
      text: "Permissions"
    timeout: 5000
- assertVisible: "Analysis"
- assertVisible: "Data Retention"

- scrollUntilVisible:
    element:
      text: "Diagnostics"
    direction: DOWN
- assertVisible: "Diagnostics"

- scrollUntilVisible:
    element:
      text: "About"
    direction: DOWN
- assertVisible: "About"

# --- Back to Briefing tab ---
- tapOn: "Briefing"
- extendedWaitUntil:
    visible:
      text: "Briefing"
    timeout: 5000
