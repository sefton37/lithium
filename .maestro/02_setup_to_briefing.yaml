# Flow: With permissions pre-granted, app should land on the main screen
# Prerequisites: Permissions granted by run-tests.sh Phase 2
appId: ai.talkingrock.lithium.debug
---
- stopApp
- waitForAnimationToEnd
- launchApp

# With all permissions granted, app should skip onboarding and show the main screen.
# Wait for the Briefing tab label which is always present in the bottom nav.
- extendedWaitUntil:
    visible:
      text: "Chat"
    timeout: 30000

# Bottom navigation tabs must all be visible
- assertVisible: "Chat"
- assertVisible: "Queue"
- assertVisible: "Rules"
- assertVisible: "Settings"
