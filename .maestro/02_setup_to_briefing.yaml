# Flow: Briefing screen loads with permissions pre-granted
# Prerequisites: Permissions granted by wrapper script before Maestro runs
appId: ai.talkingrock.lithium.debug
---
- stopApp
- waitForAnimationToEnd
- launchApp

# With permissions already granted, app should land directly on Briefing
- extendedWaitUntil:
    visible:
      text: "No new report."
    timeout: 15000

# Verify briefing content
- assertVisible: "Your next briefing will appear after the nightly analysis runs"

# Bottom navigation should be visible
- assertVisible: "Briefing"
- assertVisible: "Queue"
- assertVisible: "Rules"
- assertVisible: "Settings"
