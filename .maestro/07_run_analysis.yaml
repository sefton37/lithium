# Flow: Run Analysis Now — trigger analysis from Settings and verify Briefing updates
# Prerequisites: Permissions granted by run-tests.sh Phase 2; app has real notification data
appId: ai.talkingrock.lithium.debug
---
- stopApp
- waitForAnimationToEnd
- launchApp

# Wait for main screen
- extendedWaitUntil:
    visible:
      text: "Briefing"
    timeout: 30000

# Navigate to Settings
- tapOn: "Settings"
- extendedWaitUntil:
    visible:
      text: "Permissions"
    timeout: 5000

# Scroll to the Run Analysis Now button
- scrollUntilVisible:
    element:
      text: "Run Analysis Now"
    direction: DOWN

# Tap it
- tapOn: "Run Analysis Now"

# Snackbars are ephemeral — do not assert them; they disappear before Maestro can read them.
# Instead, give the worker a moment to queue the job, then navigate to verify output.
- waitForAnimationToEnd

# Navigate to Briefing
- tapOn: "Chat"
- extendedWaitUntil:
    visible:
      text: "Briefing"
    timeout: 5000

# With real data (~5000 notifications), a report should appear.
# "Your Briefing" is the header shown when a report exists.
- extendedWaitUntil:
    visible:
      text: "Your Briefing"
    timeout: 30000
