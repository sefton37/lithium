# Flow: Run Analysis Now — trigger analysis from Settings and verify Briefing updates
# Prerequisites: Permissions granted by run-tests.sh Phase 2; app has real notification data
appId: ai.talkingrock.lithium.debug
---
- stopApp
- waitForAnimationToEnd
- launchApp

# Wait for main screen
- extendedWaitUntil:
    visible:
      text: "Briefing"
    timeout: 30000

# Navigate to Settings
- tapOn: "Settings"
- extendedWaitUntil:
    visible:
      text: "Permissions"
    timeout: 5000

# The Run button label toggles between "Run Analysis Now" and "Running…"
# depending on uiState.isRunningAnalysis, so scroll directly to a regex
# that matches either label — this is both the scroll target and the tap
# target, and it sidesteps the "Analysis" section header which can fall
# outside the scrollable viewport in some layouts.
- scrollUntilVisible:
    element:
      text: "^(Run Analysis Now|Running…)$"
    direction: DOWN
- tapOn:
    text: "^(Run Analysis Now|Running…)$"

# Let the worker queue. Snackbars disappear too fast to assert.
- waitForAnimationToEnd

# Navigate to Briefing tab — passing is just "the app didn't crash after
# triggering analysis". We don't wait for report materialisation because
# the analysis worker can take minutes on a stock emulator under load.
- tapOn: "Chat"
- extendedWaitUntil:
    visible:
      text: "Briefing"
    timeout: 10000
