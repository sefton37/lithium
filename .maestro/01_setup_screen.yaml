# Flow: Setup Screen — verify onboarding pager renders on fresh/revoked state
# Prerequisites: Notification listener revoked by run-tests.sh Phase 1
# NOTE: Do NOT use clearState — it breaks EncryptedSharedPreferences/SQLCipher
appId: ai.talkingrock.lithium.debug
---
- stopApp
- waitForAnimationToEnd
- launchApp

# App should show setup pager. It may start at page 0 (title) or page 3
# (notification access) depending on whether onboarding was previously completed.
# A returning user whose listener was revoked lands on page 3, not page 0.
# Accept either: title page OR notification access page.
- extendedWaitUntil:
    visible:
      text: "Notification Access"
    timeout: 15000
